<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ánimo - Respiração</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/respiracao.css') }}">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
</head>
<body>
    
    <main class="app-container">

        <div style="width: 100%; max-width: 400px; display: flex; justify-content: flex-start; margin-bottom: 5px;">
            <a href="{{ url_for('tela_inicial') }}" class="btn-voltar-imagem" title="Voltar para a tela inicial">
                <img src="{{ url_for('static', filename='img/voltar.png') }}" alt="Voltar" width="85">
            </a>
        </div>

        <div class="topo-atividade">
            <h1>Exercício de Respiração</h1>
        </div>

        <div class="instrucao-inicial" id="texto-fase">
            Clique abaixo para começar
        </div>

        <div class="card-central">
            <div class="circulo-respiracao">
                <span class="status-texto">Tempo Restante:</span>
                <span class="tempo-restante" id="texto-tempo">0s</span>
            </div>
        </div>

        <div class="controle-progresso">
            <div class="barra-progresso-container">
                <div class="barra-progresso-linha">
                    <div class="indicador-progresso" id="barra-progresso" style="left: 0%;"></div>
                </div>
            </div>
        </div>

        <div class="rodape-acoes">
            <button class="botao-parar" id="meu-botao">Iniciar/Parar</button>
        </div>

    </main>

    <script>
        function alternarAtividade() {
            fetch('/alternar', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    const botao = document.getElementById('meu-botao');
                    if (botao) {
                        botao.innerText = data.botao;
                    }
                })
                .catch(err => console.error("Erro ao alternar atividade:", err));
        }

        document.getElementById('meu-botao').addEventListener('click', alternarAtividade);

        setInterval(() => {
            fetch('/status')
                .then(response => response.json())
                .then(data => {
                    const elementoFase = document.getElementById('texto-fase');
                    if (elementoFase) elementoFase.innerHTML = data.fase;

                    const elementoTempo = document.getElementById('texto-tempo');
                    if (elementoTempo) elementoTempo.innerText = data.tempo;

                    const barraProgresso = document.getElementById('barra-progresso');
                    if (barraProgresso) {
                        barraProgresso.style.left = data.porcentagem + '%';
                    }
                })
                .catch(err => console.error("Erro ao buscar status:", err));
        }, 500);
    </script>
</body>
</html>
