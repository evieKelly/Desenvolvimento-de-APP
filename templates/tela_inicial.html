<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ánimo - Tela Inicial</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tela_inicial.css') }}">
</head>
<body>

    <div class="app-container">

        <!-- Saudação principal -->
        <header class="saudacao-card">
            <h1 class="ola">Olá!</h1>
            <p class="pergunta">Como você está se sentindo hoje?</p>
        </header>

        <!-- Card Humor Médio: média dos registros de humor (vindos do Quiz) -->
        <section class="card-humor">
            <div class="humor-emoji">
                <img src="{{ url_for('static', filename='img/icones/' ~ humor.imagem) }}" alt="{{ humor.rotulo }}">
            </div>
            <div class="humor-info">
                <span class="humor-titulo">Humor Médio</span>
                <span class="humor-rotulo">{{ humor.rotulo }}</span>
                <div class="barra-humor">
                    <div class="barra-preenchida" style="width: {{ humor.porcentagem }}%;"></div>
                </div>
            </div>
        </section>

        <!-- Grid de atalhos -->
        <section class="grid-cards">

            <!-- Registro Diário de Humor abre o Quiz (responsável: Deivid) -->
            <a href="{{ url_for('quiz') }}" class="card-atalho">
                <img class="icone" src="{{ url_for('static', filename='img/icones/registro.png') }}" alt="">
                <span class="titulo-card">Registro Diário de Humor</span>
            </a>

            <a href="{{ url_for('relatorio_mensal') }}" class="card-atalho">
                <img class="icone" src="{{ url_for('static', filename='img/icones/relatorios.png') }}" alt="">
                <span class="titulo-card">Relatórios</span>
            </a>

            <a href="{{ url_for('sugestao') }}" class="card-atalho">
                <img class="icone" src="{{ url_for('static', filename='img/icones/sugestao.png') }}" alt="">
                <span class="titulo-card">Sugestão Diária</span>
            </a>

            <a href="{{ url_for('diario') }}" class="card-atalho">
                <img class="icone" src="{{ url_for('static', filename='img/icones/diario.png') }}" alt="">
                <span class="titulo-card">Diário</span>
            </a>

            <a href="{{ url_for('respiracao') }}" class="card-atalho">
                <img class="icone" src="{{ url_for('static', filename='img/icones/respiracao.png') }}" alt="">
                <span class="titulo-card">Exercícios de Respiração</span>
            </a>

            <a href="{{ url_for('centros_atendimento') }}" class="card-atalho">
                <img class="icone" src="{{ url_for('static', filename='img/icones/centros.png') }}" alt="">
                <span class="titulo-card">Centros de Atendimento</span>
            </a>

        </section>

        <!-- Barra de navegacao fixa embaixo (igual ao Figma):
             casinha leva pra propria tela inicial, telefone pros Contatos
             e o logo da Uniceplac leva pro formulario (tela Forms do Eduardo).
             a casinha e o telefone sao icones simples desenhados aqui. -->
        <nav class="barra-inferior">

            <!-- Casinha: volta pro menu inicial (esta mesma tela) -->
            <a href="{{ url_for('tela_inicial') }}" aria-label="Tela inicial">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2">
                    <path d="M3 11l9-8 9 8"></path>
                    <path d="M5 10v9h14v-9"></path>
                </svg>
            </a>

            <!-- Telefone: abre a tela de Contatos de apoio -->
            <a href="{{ url_for('contatos') }}" aria-label="Contatos">
                <svg viewBox="0 0 24 24" fill="#ffffff">
                    <path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z"></path>
                </svg>
            </a>

            <!-- Logo da Uniceplac: abre o formulario da faculdade (tela Forms) -->
            <a href="{{ url_for('forms') }}" aria-label="Formulário Uniceplac" class="item-forms">
                <img src="{{ url_for('static', filename='img/icones/logo.jpg') }}" alt="Uniceplac">
            </a>

        </nav>

    </div>

</body>
</html>
