<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ánimo - Centros de Atendimento</title>

    <!-- CSS do Leaflet (biblioteca que desenha o mapa).
         Vem de um CDN na internet, entao nao precisa baixar nada. -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/centros_atendimento.css') }}">
</head>
<body>

    <div class="app-container">

        <!-- Topo: botao de voltar para a tela inicial -->
        <header class="topo-pagina">
            <a href="{{ url_for('tela_inicial') }}" class="btn-voltar" aria-label="Voltar">←</a>
        </header>

        <!-- Titulo principal da tela -->
        <h2 class="titulo-pagina">Atendimento Especializado</h2>
        <p class="subtitulo">Precisa de ajuda presencial especializada?</p>

        <!-- Secao do mapa -->
        <h3 class="secao-mapa">Clínicas de apoio psicológico no Gama</h3>

        <!-- Cartao que envolve o mapa e o botao -->
        <div class="cartao-mapa">

            <!-- Caixa onde o Leaflet vai desenhar o mapa -->
            <div id="mapa"></div>

            <!-- Botao que abre o mapa completo no Google Maps (em outra aba) -->
            <a class="btn-mapa"
               target="_blank"
               href="https://www.google.com/maps/search/CAPS+apoio+psicologico+Gama+DF">
               Acesse o mapa
            </a>
        </div>

        <!-- Aviso importante -->
        <p class="aviso">
            Este app é um apoio, mas não substitui acompanhamento profissional.
        </p>

        <!-- Dicas de onde buscar ajuda -->
        <ul class="lista-dicas">
            <li>Consultar psicólogo/psiquiatra</li>
            <li>Procurar CAPS ou UBS</li>
            <li>Falar com médico de confiança</li>
        </ul>

    </div>

    <!-- JS do Leaflet (a biblioteca do mapa), tambem vindo do CDN -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Nosso script: cria o mapa e coloca os alfinetes dos centros -->
    <script>
        // Cria o mapa dentro da div "mapa".
        // setView recebe [latitude, longitude] do centro e o zoom inicial
        // (quanto maior o numero do zoom, mais perto fica).
        const mapa = L.map('mapa').setView([-16.0153, -48.0653], 12);

        // Adiciona as imagens do mapa (os "azulejos") vindas do OpenStreetMap,
        // que e gratuito e nao precisa de chave de API.
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(mapa);

        // Lista dos centros de apoio: cada um tem um nome e a coordenada [lat, lng].
        // OBS: as coordenadas sao aproximadas; da pra ajustar pegando o local
        // exato no Google Maps (botao direito -> copiar as coordenadas).
        const centros = [
            { nome: 'CAPS II Gama',           coord: [-16.0118, -48.0602] },
            { nome: 'UBS 1 Gama',             coord: [-16.0185, -48.0751] },
            { nome: 'CAPS AD Santa Maria',    coord: [-16.0275, -48.0135] },
            { nome: 'CAPS Valparaíso (GO)',   coord: [-16.0655, -47.9995] },
            { nome: 'CAPS Novo Gama (GO)',    coord: [-16.0782, -48.0625] },
            { nome: 'CAPS Cidade Ocidental',  coord: [-16.0752, -47.9285] }
        ];

        // Para cada centro da lista, coloca um alfinete (marker) no mapa.
        centros.forEach(function (centro) {
            // Separa a latitude e a longitude da coordenada do centro
            const lat = centro.coord[0];
            const lng = centro.coord[1];

            // Monta o link do Google Maps apontando para ESTE centro
            const linkMaps = 'https://www.google.com/maps/search/?api=1&query=' + lat + ',' + lng;

            // Conteudo da janelinha (popup): nome do centro + link para abrir
            // aquele lugar especifico no Google Maps (em outra aba).
            const conteudo =
                '<strong>' + centro.nome + '</strong><br>' +
                '<a href="' + linkMaps + '" target="_blank">Ver no Google Maps</a>';

            // Cria o alfinete e liga o popup que aparece ao clicar nele
            L.marker(centro.coord)
                .addTo(mapa)
                .bindPopup(conteudo);
        });
    </script>

</body>
</html>
